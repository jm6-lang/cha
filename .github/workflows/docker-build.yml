name: Docker Build & Push

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/shucha

jobs:
  build-gateway:
    name: Build Gateway Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/shucha-gateway/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-gateway:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_PREFIX }}-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-query:
    name: Build Query Image
    runs-on: ubuntu-latest
    permissions:
